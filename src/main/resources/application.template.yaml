# ============================================================
# AList-Media-Sync 配置模板
# ============================================================
# 使用说明：
#   1. 将此文件复制为 application.yaml
#   2. 根据实际环境修改配置项
#   3. 详细说明请参阅 README.md
# ============================================================

server:
  port: ${SERVER_PORT:8080}            # HTTP 服务端口（环境变量 SERVER_PORT）
  shutdown: graceful                   # 优雅关闭

spring:
  application:
    name: AList-Media-Sync
  lifecycle:
    timeout-per-shutdown-phase: 12s
  datasource:
    # 数据目录默认 ./data（启动包场景），可通过 DATA_DIR 环境变量覆盖
    url: jdbc:h2:file:${app.data-dir}/alist_media_sync;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:                          # H2 默认空密码
  h2:
    console:
      enabled: true                    # H2 控制台（开发调试用）
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update                 # 自动更新表结构
    show-sql: false
    open-in-view: false
  threads:
    virtual:
      enabled: true                    # 启用 Java 21 虚拟线程

# Actuator 健康检查端点配置
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# 日志级别
logging:
  level:
    root: ${LOGGING_LEVEL:INFO}
    top.lldwb.alistmediasync: ${LOGGING_LEVEL:INFO}

# ============================================================
# AList 连接配置（必填，由环境变量注入）
# ============================================================
alist:
  base-url: ${ALIST_BASE_URL:}         # AList 服务器地址（如 https://alist.example.com）
  token: ${ALIST_TOKEN:}               # AList API 认证令牌

# ============================================================
# 自定义应用配置（app.* 命名空间）
# ============================================================
app:
  # 数据库文件存储目录（环境变量 DATA_DIR，默认 ./data）
  # 启动包场景使用相对路径 ./data，Docker 场景使用 /app/data
  data-dir: ${DATA_DIR:./data}

  # 历史记录保留天数（超过此天数的 TaskExecution 和 WebhookEvent 将被清理）
  retention-days: 30

  # 应用名称和版本（由启动横幅输出使用）
  name: AList-Media-Sync
  version: 0.0.1-SNAPSHOT

  # ----------------------------------------
  # 管理后台认证配置
  # ----------------------------------------
  auth:
    # 管理员用户名（必填）
    username: admin
    # 登录密码（必填）
    # 支持两种格式：
    #   1. 明文密码（如 "admin123"）—— 每次启动时自动加密为 BCrypt 格式并保存在内存中
    #      加密值绝不写回此文件，配置文件始终保持用户填入的原始值
    #   2. BCrypt 哈希值（以 "{bcrypt}" 前缀标识）—— 跳过加密，直接用于认证
    #      生成方法：使用 BCrypt 在线工具或 Spring Security Crypto
    # 环境变量覆盖：APP_AUTH_PASSWORD
    password: "{bcrypt}$2a$10$AtWuyDKJC0K5FXjtF/vhZ.HEk2ZoLWMpyzlsOc3ac4wxY7D5Y2Yke"

  # ----------------------------------------
  # 转码配置
  # ----------------------------------------
  transcode:
    temp-suffix: ${TRANSCODE_TEMP_SUFFIX:.tmp}
    temp-dir: ${TRANSCODE_TEMP_DIR:${java.io.tmpdir}/alist-media-sync/transcode}
    max-concurrent-transcode: ${TRANSCODE_MAX_CONCURRENT:32}
    max-suffix-length: 50

  # ----------------------------------------
  # 线程池配置
  # ----------------------------------------
  pool:
    core-size: 8
    max-size: 32
